name: Codex Foundation CI

on:
  workflow_dispatch:

jobs:
  pipeline:
    name: Pipeline checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint pipeline
        run: uv run ruff check pipeline\engine pipeline\tests
      - name: Test pipeline
        run: uv run pytest pipeline\tests
