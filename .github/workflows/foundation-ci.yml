name: Codex Foundation CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    name: Foundation verification
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify foundation
        shell: pwsh
        run: .\scripts\verify-foundation.ps1 -Portable

  package:
    name: Foundation artifact CD
    runs-on: windows-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - name: Build foundation package
        shell: pwsh
        run: .\scripts\package-foundation.ps1 -OutputDir foundation-dist
      - name: Build rollback plan
        shell: pwsh
        run: .\scripts\foundation-rollback-plan.ps1 -TargetRef HEAD -OutputPath foundation-dist/foundation-rollback-plan.json
      - name: Upload foundation package
        uses: actions/upload-artifact@v4
        with:
          name: codex-foundation-${{ github.sha }}
          path: |
            foundation-dist/*.zip
            foundation-dist/*.json
          if-no-files-found: error
